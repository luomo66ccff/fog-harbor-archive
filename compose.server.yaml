name: fog-harbor

services:
  app:
    container_name: fog-harbor-app
    image: fog-harbor-archive:latest
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        NEXT_PUBLIC_SITE_URL: https://archive.luomo.moe
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8797:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  tunnel:
    container_name: fog-harbor-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env.server
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
