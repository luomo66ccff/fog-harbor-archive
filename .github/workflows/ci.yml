name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: fog-harbor-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Full dependency audit guard
        run: npm audit --audit-level=critical

      - name: Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            output/playwright/report/
            output/playwright/test-results/
            output/playwright/test-results/**/*.png
            output/playwright/test-results/**/*.webm
            output/playwright/test-results/**/*.zip
          if-no-files-found: ignore
          retention-days: 7
